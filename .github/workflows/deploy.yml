name: Deploy SIPS ke VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            if [ ! -d "/home/ubuntu/sips" ]; then
              echo "Folder /home/ubuntu/sips tidak ditemukan. Melakukan clone pertama kali..."
              git clone git@github.com:takahashiumaru/sips.git /home/ubuntu/sips
            fi

            cd /home/ubuntu/sips

            echo "[1/9] Fetch & reset ke update terbaru"
            git fetch origin
            sudo chown -R ubuntu:www-data storage bootstrap/cache || true
            sudo chmod -R ug+rwX storage bootstrap/cache || true
            git reset --hard origin/main

            echo "[2/9] Rapikan permission storage & cache"
            sudo chown -R ubuntu:www-data storage bootstrap/cache
            sudo chmod -R ug+rwX storage bootstrap/cache
            sudo find storage bootstrap/cache -type d -exec chmod g+s {} \;

            echo "[3/9] Install composer dependencies"
            /home/ubuntu/.local/bin/composer install --no-interaction --no-dev --optimize-autoloader

            echo "[4/9] Build frontend assets"
            npm ci --no-audit --no-fund
            npm run build

            echo "[5/9] Refresh storage link & migrate"
            rm -f public/storage
            php artisan storage:link
            php artisan migrate --force

            echo "[6/9] Clear & rebuild cache"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize

            echo "[7/9] Restart PHP-FPM"
            sudo systemctl restart php8.3-fpm

            echo "[8/9] Reload Nginx"
            sudo systemctl reload nginx

            echo "[9/9] Deploy SIPS selesai"
